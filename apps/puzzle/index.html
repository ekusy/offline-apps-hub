<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="15 Puzzle - Classic sliding number puzzle game">
  <title>15 Puzzle</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container puzzle-container">
    <header class="mb-2">
      <div class="header-bar">
        <a href="../../" class="back-link" data-i18n="common.backHome">← Home</a>
        <button id="lang-toggle" class="button button-small button-secondary" type="button"></button>
      </div>
      <div class="text-center">
        <h1 data-i18n="puzzle.title">🧩 15 Puzzle</h1>
        <p data-i18n="puzzle.subtitle">Arrange all numbers in order from 1 to 15</p>
      </div>
    </header>

    <main>
      <div class="puzzle-content">
        <!-- Game Board -->
        <div class="puzzle-board-wrapper">
          <div id="puzzle-board" class="puzzle-board"></div>
        </div>

        <!-- Game Info -->
        <div class="puzzle-info">
          <div class="info-item">
            <span class="info-label" data-i18n="puzzle.moves">Moves:</span>
            <span id="moves" class="info-value">0</span>
          </div>
          <div class="info-item">
            <span class="info-label" data-i18n="puzzle.time">Time:</span>
            <span id="timer" class="info-value">00:00</span>
          </div>
          <div class="info-item">
            <span class="info-label" data-i18n="puzzle.best">Best:</span>
            <span id="best-moves" class="info-value">-</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="puzzle-controls">
          <button id="shuffle-btn" class="button button-primary" data-i18n="puzzle.shuffle">🔀 Shuffle</button>
          <button id="reset-btn" class="button button-secondary" data-i18n="puzzle.reset">↻ Reset</button>
        </div>

        <!-- Download Button -->
        <div class="download-section mt-2">
          <button id="download-btn" class="button button-primary" style="width: 100%;" data-i18n="puzzle.download">
            📥 Download for Offline
          </button>
          <p class="download-hint" data-i18n="puzzle.downloadHint">
            Save this game to play offline
          </p>
        </div>
      </div>
    </main>
  </div>

  <!-- Download Progress Dialog -->
  <div id="download-dialog" class="dialog hidden">
    <div class="dialog-content">
      <h3 data-i18n="puzzle.downloading">Downloading...</h3>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="progress-text" style="text-align: center; margin-top: 1rem;">0%</p>
    </div>
  </div>

  <!-- iOS Instructions Dialog -->
  <div id="ios-dialog" class="dialog hidden">
    <div class="dialog-content">
      <h3 data-i18n="puzzle.iosTitle">Add to Home Screen</h3>
      <p data-i18n="puzzle.iosLead">To play offline on iOS:</p>
      <ol class="ios-steps" data-i18n-html="puzzle.iosSteps"></ol>
      <button id="ios-close-btn" class="button button-primary" style="width: 100%; margin-top: 1.5rem;" data-i18n="puzzle.iosGotIt">
        Got it
      </button>
    </div>
  </div>

  <script src="../../i18n.js"></script>
  <script src="./app.js"></script>
</body>
</html>
